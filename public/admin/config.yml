backend:
  name: github
  repo: XSTATEM/Echips_Wiki_Public
  branch: main
  base_url: https://echips-auth.uzakovv41.workers.dev

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "partner_docs"
    label: "Инструкции для АСЦ"
    folder: "partner"
    create: true
    fields:
      - {label: "Заголовок статьи", name: "title", widget: "string"}
      - {label: "Описание для поиска", name: "description", widget: "text", required: false}
      # Скрытое поле, чтобы комментарии всегда были включены
      - {label: "Комментарии", name: "show_comments", widget: "hidden", default: true}
      
      - label: "Конструктор контента"
        name: "blocks"
        widget: "list"
        types:
          - label: "📝 Простой текст"
            name: "text_block"
            widget: "object"
            fields:
              - {label: "Текст", name: "content", widget: "markdown"}

          - label: "🚀 Шаг инструкции"
            name: "step_block"
            widget: "object"
            fields:
              - {label: "Заголовок шага", name: "h", widget: "string"}
              - {label: "Текст шага", name: "text", widget: "markdown"}
              - {label: "Картинка", name: "image", widget: "image", required: false}

          - label: "⚠️ Важное / Совет"
            name: "callout_block"
            widget: "object"
            fields:
            - label: "Тип уведомления"
              name: "type"
              widget: "select"
              # Это заставит админку показать меню, а не кнопки
              display: "select" 
              options: 
                - { label: "💡 Совет", value: "tip" }
                - { label: "ℹ️ Инфо", value: "info" }
                - { label: "⚠️ Предупреждение", value: "warning" }
                - { label: "🔥 Опасно", value: "danger" }
              default: "tip"
            - {label: "Заголовок (необязательно)", name: "title", widget: "string", required: false}
            - {label: "Текст совета", name: "content", widget: "markdown"}

          - label: "🎥 Видео (YouTube/Ссылка)"
            name: "video_block"
            widget: "object"
            fields:
              - {label: "Ссылка на видео", name: "url", widget: "string"}
              - {label: "Подпись", name: "caption", widget: "string", required: false}

          - label: "📎 Файл для скачивания"
            name: "file_block"
            widget: "object"
            fields:
              - {label: "Название файла", name: "label", widget: "string"}
              - {label: "Ссылка или файл", name: "file", widget: "file"}

          - label: "📊 Таблица"
            name: "table_block"
            widget: "object"
            fields:
              - {label: "Заголовок таблицы", name: "caption", widget: "string", required: false}
              - {label: "Данные (Markdown формат)", name: "table_data", widget: "markdown", help: "Создайте таблицу здесь или скопируйте из Excel"}

          - label: "🖼️ Галерея изображений"
            name: "gallery_block"
            widget: "object"
            fields:
              - label: "Фотографии"
                name: "images"
                widget: "list"
                fields:
                  - {label: "Изображение", name: "url", widget: "image"}
                  - {label: "Подпись", name: "alt", widget: "string", required: false}

          - label: "🔘 Кнопка-ссылка"
            name: "button_block"
            widget: "object"
            fields:
              - {label: "Текст на кнопке", name: "text", widget: "string"}
              - {label: "Ссылка", name: "link", widget: "string"}
              - label: "Цвет"
                name: "color"
                widget: "select"
                options: ["brand", "alt", "sponsor"]
                default: "brand"

      - {label: "Весь текст (Markdown)", name: "body", widget: "markdown", required: false}

  - name: "database"
    label: "Базы данных"
    files:
      - label: "Сервисные центры (АСЦ)"
        name: "service_centers"
        file: "service/centers.json"
        # Эти две строчки говорят админке, что это чистые данные, а не Markdown!
        extension: "json"
        format: "json"
        fields:
          - label: "Список сервисных центров"
            name: "centers"
            widget: "list"
            fields:
              - {label: "Город", name: "city", widget: "string"}
              - {label: "Название", name: "name", widget: "string"}
              - label: "Тип"
                name: "type"
                widget: "select"
                options: ["Основной", "Партнер", "Приемный пункт"]
                default: "Основной"
              - {label: "Адрес", name: "address", widget: "string"}
              - {label: "Телефон", name: "phone", widget: "string"}
              - {label: "Ссылка на карту", name: "map", widget: "string", required: false}
              - {label: "Широта (lat)", name: "lat", widget: "number", value_type: "float", required: false}
              - {label: "Долгота (lng)", name: "lng", widget: "number", value_type: "float", required: false}
- name: "laptops"
    label: "Линейки ноутбуков"
    folder: "laptops" # Админка будет создавать .md файлы прямо в эту папку
    create: true
    fields:
      - {label: "Название линейки (например, Hot)", name: "title", widget: "string"}
      - {label: "Картинка ноутбука", name: "image", widget: "image"}
      - {label: "Layout", name: "layout", widget: "hidden", default: "page"}
      - {label: "Скрывать сайдбар", name: "sidebar", widget: "hidden", default: false}
      - label: "Шаблон страницы (не трогать)"
        name: "body"
        widget: "markdown"
        default: |
          <script setup>
          import LineTemplate from '../components/LineTemplate.vue'
          </script>
          <LineTemplate />
  - name: "skus"
    label: "Артикулы (Модели)"
    folder: "laptops/models"
    create: true
    fields:
      - {label: "Артикул (например, XPS15U57-1)", name: "title", widget: "string"}
      - label: "Относится к линейке"
        name: "line"
        widget: "relation"
        collection: "laptops" 
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
      
      - {label: "Изображение модели", name: "image", widget: "image", required: false}
      
      - label: "Характеристики"
        name: "specs"
        widget: "object"
        fields:
          - {label: "Процессор", name: "cpu", widget: "string"}
          - {label: "Оперативная память", name: "ram", widget: "string", help: "Например: 16GB / LPDDR4"}
          - {label: "Возможность расширения ОЗУ", name: "ram_upgrade", widget: "string", required: false, help: "Например: нет"}
          - {label: "Видеокарта", name: "gpu", widget: "string", help: "Например: Интегрированная Intel UHD"}
          - {label: "Накопитель", name: "storage", widget: "string", help: "Например: SSD 512GB (M.2 SATA)"}
          - {label: "Слоты накопителя", name: "storage_slots", widget: "string", required: false, help: "Например: 2"}
          - {label: "Экран", name: "screen", widget: "string", help: "Например: 15.6\" 1920x1080 60 Гц IPS"}
          - {label: "Веб-камера", name: "webcam", widget: "string", required: false, help: "Например: 2 Мп (1080p)"}
          - {label: "Type-C", name: "type_c", widget: "string", required: false, help: "Например: 1 (только передача данных)"}
          - {label: "Видеовыходы", name: "video_out", widget: "string", required: false, help: "Например: HDMI"}
          - {label: "Дополнительно", name: "extra", widget: "string", required: false, help: "Подсветка, сканер отпечатка (например: Подсветка - да, Отпечаток - нет)"}
          - {label: "Батарея", name: "battery", widget: "string", required: false, help: "Например: 4000 мА*ч"}
          - {label: "Блок питания", name: "power", widget: "string", required: false, help: "Например: 19В 3.42А / 3,5х1,35 мм"}
          - {label: "Поддерживаемые ОС", name: "os", widget: "string", default: "Windows 11"}

      - label: "Драйверы и BIOS"
        name: "drivers"
        widget: "list"
        fields:
          - {label: "Название файла", name: "name", widget: "string", default: "Полный пакет драйверов"}
          - {label: "Ссылка на скачивание", name: "url", widget: "string"}
          - {label: "Версия / Дата (опционально)", name: "version", widget: "string", required: false}

      - label: "Частые вопросы (FAQ) для этой модели"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - {label: "Вопрос", name: "q", widget: "string"}
          - {label: "Ответ", name: "a", widget: "text"}

      - {label: "Layout", name: "layout", widget: "hidden", default: "page"}
      
      - label: "Скрывать сайдбар"
        name: "sidebar"
        widget: "hidden"
        default: false

      - label: "Шаблон страницы (не трогать)"
        name: "body"
        widget: "markdown"
        default: |
          <script setup>
          import SkuTemplate from '../../components/SkuTemplate.vue'
          </script>
          <SkuTemplate />
  - name: "monoblocks"
    label: "Линейки моноблоков"
    folder: "monoblocks"
    create: true
    fields:
      - {label: "Название линейки (например, Серия 24)", name: "title", widget: "string"}
      - {label: "Картинка", name: "image", widget: "image"}
      - {label: "Layout", name: "layout", widget: "hidden", default: "page"}
      - {label: "Скрывать сайдбар", name: "sidebar", widget: "hidden", default: false}
      - label: "Шаблон страницы (не трогать)"
        name: "body"
        widget: "markdown"
        default: |
          <script setup>
          import MonoblockLineTemplate from '../components/MonoblockLineTemplate.vue'
          </script>
          <MonoblockLineTemplate />

  - name: "monoblock_skus"
    label: "Артикулы (Моноблоки)"
    folder: "monoblocks"
    path: "{{line}}/{{slug}}"
    create: true
    fields:
      - {label: "Артикул (например, M24A)", name: "title", widget: "string"}
      - label: "Относится к линейке"
        name: "line"
        widget: "relation"
        collection: "monoblocks" 
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
      - {label: "Изображение модели", name: "image", widget: "image", required: false}
      
      - label: "Характеристики"
        name: "specs"
        widget: "object"
        fields:
          - {label: "Процессор", name: "cpu", widget: "string"}
          - {label: "Оперативная память", name: "ram", widget: "string"}
          - {label: "Возможность расширения ОЗУ", name: "ram_upgrade", widget: "string", required: false}
          - {label: "Видеокарта", name: "gpu", widget: "string"}
          - {label: "Накопитель", name: "storage", widget: "string"}
          - {label: "Слоты накопителя", name: "storage_slots", widget: "string", required: false}
          - {label: "Экран", name: "screen", widget: "string"}
          - {label: "Веб-камера", name: "webcam", widget: "string", required: false}
          - {label: "Type-C", name: "type_c", widget: "string", required: false}
          - {label: "Видеовыходы", name: "video_out", widget: "string", required: false}
          - {label: "Дополнительно", name: "extra", widget: "string", required: false}
          - {label: "Блок питания", name: "power", widget: "string", required: false}
          - {label: "Поддерживаемые ОС", name: "os", widget: "string", default: "Windows 11"}

      - label: "Драйверы и BIOS"
        name: "drivers"
        widget: "list"
        fields:
          - {label: "Название файла", name: "name", widget: "string", default: "Полный пакет драйверов"}
          - {label: "Ссылка на скачивание", name: "url", widget: "string"}
          - {label: "Версия / Дата", name: "version", widget: "string", required: false}

      - label: "Частые вопросы (FAQ)"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - {label: "Вопрос", name: "q", widget: "string"}
          - {label: "Ответ", name: "a", widget: "text"}

      - {label: "Layout", name: "layout", widget: "hidden", default: "page"}
      - {label: "Скрывать сайдбар", name: "sidebar", widget: "hidden", default: false}

      - label: "Шаблон страницы (не трогать)"
        name: "body"
        widget: "markdown"
        default: |
          <script setup>
          import SkuTemplate from '../../components/SkuTemplate.vue'
          </script>
          <SkuTemplate />