backend:
  name: github
  repo: XSTATEM/Echips_Wiki_Public
  branch: main
  base_url: https://echips-auth.uzakovv41.workers.dev

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "partner_docs"
    label: "Инструкции для АСЦ"
    folder: "partner"
    create: true
    fields:
      - {label: "Заголовок статьи", name: "title", widget: "string"}
      - {label: "Описание для поиска", name: "description", widget: "text", required: false}
      # Скрытое поле, чтобы комментарии всегда были включены
      - {label: "Комментарии", name: "show_comments", widget: "hidden", default: true}
      
      - label: "Конструктор контента"
        name: "blocks"
        widget: "list"
        types:
          - label: "📝 Простой текст"
            name: "text_block"
            widget: "object"
            fields:
              - {label: "Текст", name: "content", widget: "markdown"}

          - label: "🚀 Шаг инструкции"
            name: "step_block"
            widget: "object"
            fields:
              - {label: "Заголовок шага", name: "h", widget: "string"}
              - {label: "Текст шага", name: "text", widget: "markdown"}
              - {label: "Картинка", name: "image", widget: "image", required: false}

          - label: "⚠️ Важное / Совет"
            name: "callout_block"
            widget: "object"
            fields:
            - label: "Тип уведомления"
              name: "type"
              widget: "select"
              # Это заставит админку показать меню, а не кнопки
              display: "select" 
              options: 
                - { label: "💡 Совет", value: "tip" }
                - { label: "ℹ️ Инфо", value: "info" }
                - { label: "⚠️ Предупреждение", value: "warning" }
                - { label: "🔥 Опасно", value: "danger" }
              default: "tip"
            - {label: "Заголовок (необязательно)", name: "title", widget: "string", required: false}
            - {label: "Текст совета", name: "content", widget: "markdown"}

          - label: "🎥 Видео (YouTube/Ссылка)"
            name: "video_block"
            widget: "object"
            fields:
              - {label: "Ссылка на видео", name: "url", widget: "string"}
              - {label: "Подпись", name: "caption", widget: "string", required: false}

          - label: "📎 Файл для скачивания"
            name: "file_block"
            widget: "object"
            fields:
              - {label: "Название файла", name: "label", widget: "string"}
              - {label: "Ссылка или файл", name: "file", widget: "file"}

          - label: "📊 Таблица"
            name: "table_block"
            widget: "object"
            fields:
              - {label: "Заголовок таблицы", name: "caption", widget: "string", required: false}
              - {label: "Данные (Markdown формат)", name: "table_data", widget: "markdown", help: "Создайте таблицу здесь или скопируйте из Excel"}

          - label: "🖼️ Галерея изображений"
            name: "gallery_block"
            widget: "object"
            fields:
              - label: "Фотографии"
                name: "images"
                widget: "list"
                fields:
                  - {label: "Изображение", name: "url", widget: "image"}
                  - {label: "Подпись", name: "alt", widget: "string", required: false}

          - label: "🔘 Кнопка-ссылка"
            name: "button_block"
            widget: "object"
            fields:
              - {label: "Текст на кнопке", name: "text", widget: "string"}
              - {label: "Ссылка", name: "link", widget: "string"}
              - label: "Цвет"
                name: "color"
                widget: "select"
                options: ["brand", "alt", "sponsor"]
                default: "brand"

      - {label: "Весь текст (Markdown)", name: "body", widget: "markdown", required: false}

  - name: "database"
    label: "Базы данных"
    files:
      - label: "Сервисные центры (АСЦ)"
        name: "service_centers"
        file: "service/centers.json"
        # Эти две строчки говорят админке, что это чистые данные, а не Markdown!
        extension: "json"
        format: "json"
        fields:
          - label: "Список сервисных центров"
            name: "centers"
            widget: "list"
            fields:
              - {label: "Город", name: "city", widget: "string"}
              - {label: "Название", name: "name", widget: "string"}
              - label: "Тип"
                name: "type"
                widget: "select"
                options: ["Основной", "Партнер", "Приемный пункт"]
                default: "Основной"
              - {label: "Адрес", name: "address", widget: "string"}
              - {label: "Телефон", name: "phone", widget: "string"}
              - {label: "Ссылка на карту", name: "map", widget: "string", required: false}
              - {label: "Широта (lat)", name: "lat", widget: "number", value_type: "float", required: false}
              - {label: "Долгота (lng)", name: "lng", widget: "number", value_type: "float", required: false}
  - name: "laptops"
    label: "Линейки ноутбуков"
    folder: "laptops" # Админка будет создавать .md файлы прямо в эту папку
    create: true
    fields:
      - {label: "Название линейки (например, Hot)", name: "title", widget: "string"}
      - {label: "Картинка ноутбука", name: "image", widget: "image"}
      - {label: "Скрывать сайдбар", name: "sidebar", widget: "hidden", default: false}
      - label: "Шаблон страницы (доредактируйте таблицы)"
        name: "body"
        widget: "markdown"
        default: |
          <script setup>
          import { ref } from 'vue'
          const activeTab = ref('drivers')
          </script>

          <div class="tabs-container glass-effect tilt-card">
            <div class="tabs-header">
              <button class="tab-btn" :class="{ active: activeTab === 'drivers' }" @click="activeTab = 'drivers'">Драйверы и BIOS</button>
              <button class="tab-btn" :class="{ active: activeTab === 'manuals' }" @click="activeTab = 'manuals'">Инструкции</button>
            </div>

            <div class="tabs-content"> 
              <div v-show="activeTab === 'drivers'" class="tab-pane fade-in">
                <h3>Загрузка драйверов</h3>
                <table class="apple-table">
                  <thead><tr><th>Артикул</th><th>Драйверы</th></tr></thead>
                  <tbody>
                    <tr><td>Ваш Артикул</td><td><a href="#">Скачать архив ↓</a></td></tr>
                  </tbody>
                </table>
              </div>
              <div v-show="activeTab === 'manuals'" class="tab-pane fade-in">
                <h3>Инструкции</h3>
                <p>Здесь будут руководства.</p>
              </div>
            </div>
          </div>
  - name: "skus"
    label: "Артикулы (Модели)"
    folder: "laptops/models"
    create: true
    fields:
      - {label: "Артикул (например, XPS15U57-1)", name: "title", widget: "string"}
      - label: "Относится к линейке"
        name: "line"
        widget: "relation"
        collection: "laptops" 
        search_fields: ["title"]
        value_field: "title"
        display_fields: ["title"]
      
      - {label: "Изображение модели", name: "image", widget: "image", required: false}
      
      - label: "Характеристики"
        name: "specs"
        widget: "object"
        fields:
          - {label: "Процессор", name: "cpu", widget: "string"}
          - {label: "Оперативная память", name: "ram", widget: "string", help: "Укажите объем и тип (например, 8GB DDR4 распаяна)"}
          - {label: "Накопитель", name: "storage", widget: "string"}
          - {label: "Экран", name: "screen", widget: "string"}
          - {label: "Поддерживаемые ОС", name: "os", widget: "string", default: "Windows 11"}

      - label: "Драйверы и BIOS"
        name: "drivers"
        widget: "list"
        fields:
          - {label: "Название файла", name: "name", widget: "string", default: "Полный пакет драйверов"}
          - {label: "Ссылка на скачивание", name: "url", widget: "string"}
          - {label: "Версия / Дата (опционально)", name: "version", widget: "string", required: false}

      - label: "Частые вопросы (FAQ) для этой модели"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - {label: "Вопрос", name: "q", widget: "string"}
          - {label: "Ответ", name: "a", widget: "text"}

      - label: "Скрывать сайдбар"
        name: "sidebar"
        widget: "hidden"
        default: false

      - label: "Шаблон страницы (не трогать)"
        name: "body"
        widget: "markdown"
        default: |
          <script setup>
          import SkuTemplate from '../../components/SkuTemplate.vue'
          </script>
          <SkuTemplate />